<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="38" fill="#1a3d6b"/>
  <!--
    Waveform centered at (90, 90):
    x range: 35 to 145 = 110px total, center = (35+145)/2 = 90 ✓
    y range: 55 to 125 = 70px total, center = (55+125)/2 = 90 ✓
  -->
  <polyline
    points="35,90  53,90  61,90  69,55  78,125  87,55  96,125  104,90  112,90  145,90"
    stroke="#5cb8a0"
    stroke-width="5"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
