<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Radial glow — top right -->
  <defs>
    <radialGradient id="glow-tr" cx="100%" cy="0%" r="60%" gradientUnits="userSpaceOnUse"
      fx="1200" fy="0" cx="1200" cy="0">
      <stop offset="0%"   stop-color="#5cb8a0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5cb8a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-bl" cx="0%" cy="100%" r="50%" gradientUnits="userSpaceOnUse"
      fx="0" fy="630" cx="0" cy="630">
      <stop offset="0%"   stop-color="#1a3d6b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a3d6b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow-tr)"/>
  <rect width="1200" height="630" fill="url(#glow-bl)"/>

  <!-- Large faint waveform — right half watermark -->
  <polyline
    points="750,315 815,315 844,315 872,189 905,441 937,189 970,441 998,315 1027,315 1146,315"
    stroke="#5cb8a0"
    stroke-width="7"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.07"/>

  <!-- Left vertical accent bar -->
  <rect x="80" y="80" width="2" height="470" fill="#5cb8a0" opacity="0.35" rx="1"/>

  <!-- CadenceOS icon — top left (inline from cadenceos-icon.svg) -->
  <g transform="translate(100, 82)">
    <rect width="36" height="36" rx="8" fill="#1a3d6b"/>
    <polyline
      points="5,18 9.5,18 11,18 13,10 15.5,26 18,10 20.5,26 22,18 24,18 31,18"
      stroke="#5cb8a0"
      stroke-width="2"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- Brand name -->
  <text
    x="146" y="107"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="17"
    font-weight="500"
    fill="white"
    letter-spacing="0.2">CadenceOS</text>

  <!-- Eyebrow -->
  <text
    x="100" y="160"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="11"
    font-weight="700"
    fill="#5cb8a0"
    letter-spacing="2.5">CLINICAL OPERATING SYSTEM</text>

  <!-- Divider -->
  <rect x="100" y="178" width="56" height="1.5" fill="#5cb8a0" opacity="0.5" rx="1"/>

  <!-- Headline line 1 -->
  <text
    x="100" y="295"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="68"
    font-weight="600"
    fill="white"
    letter-spacing="-2">Your clinical system,</text>

  <!-- Headline line 2 -->
  <text
    x="100" y="380"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="68"
    font-weight="600"
    letter-spacing="-2">
    <tspan fill="rgba(255,255,255,0.9)">finally </tspan><tspan fill="#5cb8a0">in software.</tspan>
  </text>

  <!-- Bottom divider -->
  <rect x="100" y="490" width="1000" height="1" fill="rgba(255,255,255,0.07)"/>

  <!-- Domain -->
  <text
    x="100" y="530"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="16"
    font-weight="300"
    fill="rgba(255,255,255,0.35)"
    letter-spacing="0.5">curacadence.com</text>

  <!-- Right tagline -->
  <text
    x="1100" y="530"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="300"
    fill="rgba(255,255,255,0.2)"
    text-anchor="end"
    letter-spacing="0.3">Built around your protocols. Isolated to your practice.</text>

</svg>
